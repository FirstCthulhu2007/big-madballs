<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- Важно для мобильных устройств -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АНЯ</title>
    <!-- Подключаем CSS стили -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <img src="АНЯ.jpg" alt="Обложка трека" class="cover-image">
        <h1>АНЯ</h1>
        <p class="artist">Биг Мэдболлс</p>

        <!-- HTML5 аудио плеер -->
        <audio id="myPlayer" controls loop>
            <!-- https://FirstCthulhu2007.github.io/big-madballs/АНЯ.mp3 -->
            <source src="АНЯ.mp3" type="audio/mpeg">
            Ваш браузер не поддерживает аудио плеер.
        </audio>

        <!-- Кнопка для включения звука (чтобы обойти автозапуск) -->
        <button id="playButton">🎵 Включить песню</button>

        <div class="lyrics">
            <p> </p>
        </div>
    </div>

    <!-- Подключаем скрипты -->
    <script src="script.js"></script>
</body>
</html>
